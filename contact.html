<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Flipkart Clone</title>
    <link rel="stylesheet" href="stylecontact.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../utils.css">
</head>
<body>

 <header>
          <nav>
            <div class="logo">
               <img src="../flipkart-logo.png" alt="">
            </div>
            <ul>
                <nav>
                    <li><a href="../index.html" class="active">Home</a></li>
                    <li><a href="../Products.html">Products</a></li>
                    <li><a href="../about.html">About</a></li>
                    <li><a href="../contact.html">Contact</a></li>
                </nav>
            </ul>
            <div class="search">
                <input type="text" name="" id="" placeholder="Search Here">
                <button class="btn">search</button>
            </div>
          </nav>
    </header>

<section class="contact">
    <div class="contact-info">

        <h2>Contact Us</h2>
        <p>Have questions? We'd love to hear from you.</p>

        <div class="info">
            <i class="fa-solid fa-location-dot"></i>
            <span>Bangalore, Karnataka, India</span>
        </div>

        <div class="info">
            <i class="fa-solid fa-phone"></i>
            <span>+91 9876543210</span>
        </div>

        <div class="info">
            <i class="fa-solid fa-envelope"></i>
            <span>support@flipkartclone.com</span>
        </div>

        <div class="social">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-linkedin"></i>
            <i class="fab fa-twitter"></i>
        </div>

    </div>

    <div class="contact-form">

        <form>

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="text" placeholder="Subject">

            <textarea rows="6" placeholder="Write your message..." required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>
</section>

<footer>
    <p>© 2026 Flipkart Clone | Designed by Komal</p>
</footer>

</body>
</html>
